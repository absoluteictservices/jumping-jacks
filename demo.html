/* ---------- state ---------- */
function todayKey(){return new Intl.DateTimeFormat('en-CA',{timeZone:'Europe/London',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());}
function addDays(key,n){const p=key.split('-').map(Number);const d=new Date(Date.UTC(p[0],p[1]-1,p[2]));d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10);}
function seed(){
  const t=todayKey();
  return {
    inflatables:DEMO_PRODUCTS.map(p=>({...p})),
    settings:{maxDeliveriesPerDay:1,minLeadTimeDays:1,holdMinutes:15,prefixes:['LS']},
    bookings:[
      {id:'demo1',castleId:'c1',date:addDays(t,5),status:'paid',customerName:'Sample Booking',email:'demo@example.com',phone:'07000 000000',postcode:'LS6 1AB',address:'12 Demo Street',deliveryTime:'Early morning (8–10am)',totalPence:8000},

    ],
    blackouts:[addDays(t,8)]
  };
}

function load(){try{state=JSON.parse(localStorage.getItem(KEY))||seed();}catch(e){state=seed();}}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function resetDemo(){state=seed();save();render();}
load();

/* ---------- availability engine (mirrors the real server logic) ---------- */
function isActive(b){if(b.status==='cancelled')return false;if(b.status==='paid')return true;if(!b.holdExpiresAt)return true;return new Date(b.holdExpiresAt).getTime()>Date.now();}
function dayAvail(castleId,date){
  const s=state.settings;
  const earliest=addDays(todayKey(),Math.max(0,s.minLeadTimeDays));
  if(date<earliest)return{available:false,reason:'Too soon (lead time)'};
  if(state.blackouts.includes(date))return{available:false,reason:'Blacked out'};
  const active=state.bookings.filter(b=>b.date===date&&isActive(b));
  if(active.some(b=>b.castleId===castleId))return{available:false,reason:'This castle is booked'};
  if(active.length>=Math.max(1,s.maxDeliveriesPerDay))return{available:false,reason:'Daily delivery limit reached'};
  return{available:true};
}
function covered(pc){const n=(pc||'').toUpperCase().replace(/\s+/g,'');return state.settings.prefixes.length===0||state.settings.prefixes.some(p=>n.startsWith(p.toUpperCase()));}

function bySlug(s){return state.inflatables.find(c=>c.slug===s);}
function byId(id){return state.inflatables.find(c=>c.id===id);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function img(c){const g=GRADS[(c.sortOrder||1)%GRADS.length];const ph='<div class="ph" style="background:'+g+'"><span>'+esc(c.name)+'</span></div>';return '<div class="imgwrap">'+ph+(c.image?'<img src="'+c.image+'" alt="'+esc(c.name)+'" onload="this.style.opacity=1" onerror="this.remove()"/>':'')+'</div>';}
function fmtDate(key){const p=key.split('-').map(Number);return new Date(Date.UTC(p[0],p[1]-1,p[2])).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric',timeZone:'UTC'});}

    <p class="muted" style="margin:6px 0 22px">Tap one to check its live availability calendar.</p>
    <div class="grid">${cs.map(castleCard).join('')}</div>
    <div style="text-align:center;margin-top:26px"><a class="btn btn-primary" href="#/castles">View all castles</a></div>
  </div></section>`;
}
function castleCard(c){
  return `<a class="card castle" href="#/castle/${c.slug}">${img(c)}<div class="body">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">${c.theme?'<span class="chip">'+esc(c.theme)+'</span>':''}</div>
    <h3>${esc(c.name)}</h3>
    <div class="muted" style="font-size:13px;margin:2px 0 8px">${c.ageSuitability?esc(c.ageSuitability):''}</div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span class="price">${gbp(c.pricePence)}${c.pricePence!=null?'<span class="muted" style="font-size:13px"> /day</span>':''}</span>
    </div>
    <div class="btn btn-primary" style="width:100%;margin-top:12px;justify-content:center">Check availability</div>
  </div></a>`;
}
function viewCastles(){
  const cs=state.inflatables.filter(c=>c.active);
  return `<section class="section"><div class="wrap">
    <div class="breadcrumb"><a href="#/">Home</a> / Bouncy castles</div>
    <h2 style="font-size:32px">Our bouncy castles</h2>
    <p class="muted" style="margin:6px 0 22px">Pick a favourite and check its live availability calendar.</p>
    <div class="grid">${cs.map(castleCard).join('')}</div>
  </div></section>`;
}

let calMonth=null, selDate=null;
function viewCastle(slug){
  const c=bySlug(slug); if(!c) return '<div class="wrap section">Not found.</div>';
  if(calMonth===null) calMonth=todayKey().slice(0,7);
  selDate=null;
  setTimeout(()=>renderCalendar(c.id),0);
  return `<section class="section"><div class="wrap">
    <div class="breadcrumb"><a href="#/castles">Bouncy castles</a> / ${esc(c.name)}</div>
    <div style="display:grid;gap:32px;grid-template-columns:1fr 1fr" class="detailgrid">
      <div>
        <div class="card" style="overflow:hidden;border-radius:26px">${img(c)}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:16px">
          ${c.theme?'<span class="chip">'+esc(c.theme)+'</span>':''}${c.ageSuitability?'<span class="chip">'+esc(c.ageSuitability)+'</span>':''}
        </div>
        <h1 style="font-size:34px;margin-top:12px">${esc(c.name)}</h1>
        <div class="price" style="font-size:24px;margin-top:6px">${gbp(c.pricePence)}${c.pricePence!=null?'<span class="muted" style="font-size:15px"> /day</span>':''}</div>
        <p style="margin-top:14px;line-height:1.6">${esc(c.description)}</p>
        <ul class="muted" style="margin-top:14px;line-height:1.9;font-size:14px">
          <li>✓ Delivered, set up and collected — full day hire</li>
          <li>✓ Cleaned and safety-checked before every party</li>
          <li>✓ Covers Leeds and surrounding areas</li>
        </ul>
      </div>
      <div><h2 style="font-size:22px;margin-bottom:12px">Check availability & book</h2>
        <div class="card" id="bookcard" style="padding:16px"></div>
      </div>
    </div>
  </div></section>`;
}
function renderCalendar(castleId){
  const c=byId(castleId); const card=document.getElementById('bookcard'); if(!card)return;
  if(c.pricePence==null){card.innerHTML='<p style="font-weight:800">Online booking coming soon for this one.</p><p class="muted">Give us a call on 07769 781666 and we\'ll book you in.</p>';return;}
  const [Y,M]=calMonth.split('-').map(Number);
  const first=new Date(Y,M-1,1); const blanks=(first.getDay()+6)%7; const dim=new Date(Y,M,0).getDate();
  const thisMonth=todayKey().slice(0,7);
  let cells='';
  for(let i=0;i<blanks;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const key=Y+'-'+String(M).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const a=dayAvail(castleId,key); const sel=selDate===key;
    const cls=sel?'day sel':(a.available?'day avail':'day off');
    cells+=`<button class="${cls}" ${a.available?'':'disabled'} title="${a.available?'Available':esc(a.reason)}" onclick="pickDate('${castleId}','${key}')">${d}</button>`;
  }
  const dows=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(x=>'<div class="dow">'+x+'</div>').join('');
  const label=first.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  card.innerHTML=`
    <div class="calhead">
      <button class="calnav" ${calMonth<=thisMonth?'disabled':''} onclick="moveMonth('${castleId}',-1)">‹</button>
      <strong style="font-family:'Baloo 2';font-size:18px">${label}</strong>
      <button class="calnav" onclick="moveMonth('${castleId}',1)">›</button>
    </div>
    <div class="cal">${dows}${cells}</div>
    <div class="legend"><span><i style="background:rgba(61,214,140,.4)"></i>Available</span><span><i style="background:rgba(0,0,0,.1)"></i>Unavailable</span></div>
    <div id="bookform"></div>`;
  if(selDate)renderForm(castleId);
}
function moveMonth(castleId,dir){const [Y,M]=calMonth.split('-').map(Number);const d=new Date(Y,M-1+dir,1);calMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');renderCalendar(castleId);}
function pickDate(castleId,key){selDate=key;renderCalendar(castleId);document.getElementById('bookform').scrollIntoView({behavior:'smooth',block:'nearest'});}
function renderForm(castleId){
  const c=byId(castleId); const f=document.getElementById('bookform');
  f.innerHTML=`<div style="border-top:1px solid rgba(0,0,0,.08);margin-top:14px;padding-top:14px;background:rgba(141,114,225,.05);border-radius:14px;padding:14px">
    <p style="font-weight:800">Booking <span style="color:var(--purple)">${esc(c.name)}</span> for <span style="color:var(--purple)">${fmtDate(selDate)}</span></p>
    <div class="formgrid" style="margin-top:10px">
      <div><label>Your name *</label><input id="f_name" value="Test Customer"/></div>
      <div><label>Phone *</label><input id="f_phone" value="07700 900123"/></div>
      <div class="full"><label>Email *</label><input id="f_email" value="you@example.com"/></div>
      <div><label>Delivery postcode *</label><input id="f_pc" value="LS6 1AB"/></div>
      <div><label>Address *</label><input id="f_addr" value="1 Test Street, Leeds"/></div>
      <div class="full"><label>Preferred delivery time</label><select id="f_time">${DELIVERY_TIMES.map(o=>'<option value="'+esc(o)+'">'+esc(o)+'</option>').join('')}</select><p class="muted" style="font-size:12px;margin-top:4px">Full-day hire — we'll aim for your preferred time and confirm the day before.</p></div>
      <div class="full"><label>Notes</label><input id="f_notes" placeholder="Surface (grass/hard), access…"/></div>
    </div>
    <div id="f_err"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:12px;justify-content:center" onclick="payDemo('${castleId}')">Pay &amp; book — ${gbp(c.pricePence)} (demo)</button>
    <p class="muted" style="text-align:center;font-size:12px;margin-top:8px">Demo only — no card is charged. In the real site this is secure Stripe payment.</p>
  </div>`;
}
function payDemo(castleId){
  const c=byId(castleId); const g=id=>document.getElementById(id).value.trim();
  const name=g('f_name'),phone=g('f_phone'),email=g('f_email'),pc=g('f_pc'),addr=g('f_addr');
  const deliveryTime=document.getElementById('f_time').value;
  const err=document.getElementById('f_err');
  if(!name||!phone||!email||!pc||!addr){err.innerHTML='<div class="err">Please fill in all required fields.</div>';return;}
  if(!covered(pc)){err.innerHTML='<div class="err">Sorry, that postcode is outside our delivery area (demo accepts LS… postcodes).</div>';return;}
  // re-validate (race-safe gate, same as server)
  const a=dayAvail(castleId,selDate);
  if(!a.available){err.innerHTML='<div class="err">Sorry, that date was just taken: '+esc(a.reason)+'. Pick another.</div>';renderCalendar(castleId);return;}
  const id='b'+Date.now();
  state.bookings.push({id,castleId,date:selDate,status:'paid',customerName:name,email,phone,postcode:pc,address:addr,deliveryTime,totalPence:c.pricePence});
  save();
  location.hash='#/confirm/'+id;
}
function viewConfirm(id){
  const b=state.bookings.find(x=>x.id===id); const c=b&&byId(b.castleId);
  if(!b)return '<div class="wrap section">Booking not found.</div>';
  return `<section class="section"><div class="wrap" style="max-width:560px;text-align:center">
    <div style="width:64px;height:64px;border-radius:999px;background:rgba(61,214,140,.2);display:grid;place-items:center;font-size:30px;margin:0 auto">🎉</div>
    <h1 style="font-size:34px;margin-top:14px">You're all booked!</h1>
    <p class="muted" style="margin-top:8px">In the real site a confirmation email goes to the customer and the owner now.</p>
    <div class="card" style="padding:20px;margin-top:22px;text-align:left">
      ${row('Inflatable',esc(c.name))}${row('Date',fmtDate(b.date))}${b.deliveryTime?row('Preferred time',esc(b.deliveryTime)):''}${row('Delivery to',esc(b.address)+', '+esc(b.postcode))}${row('Total paid',gbp(b.totalPence))}${row('Booking ref',id.slice(-8).toUpperCase())}
      <div class="ok" style="margin-top:12px">Confirmed & paid. This date is now blocked on the calendar — try booking it again to see the protection work.</div>
    </div>
    <div style="margin-top:22px;display:flex;gap:10px;justify-content:center">
      <a class="btn btn-ghost" href="#/castle/${c.slug}">Back to ${esc(c.name)}</a>
      <a class="btn btn-primary" href="#/admin">See it in admin</a>
    </div>
  </div></section>`;
}
function row(k,v){return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.05)"><span class="muted" style="font-size:13px">'+k+'</span><strong>'+v+'</strong></div>';}

/* ---------- ADMIN ---------- */
function viewAdmin(tab){
  tab=tab||'bookings';
  const t=(k,l)=>`<a class="${tab===k?'on':''}" href="#/admin/${k}">${l}</a>`;
  let body='';
  if(tab==='bookings')body=adminBookings();
  else if(tab==='inflatables')body=adminInflatables();
  else if(tab==='blackouts')body=adminBlackouts();
  else if(tab==='settings')body=adminSettings();
  return `<section class="section"><div class="wrap">
    <h2 style="font-size:30px">Owner Admin <span class="muted" style="font-size:15px">(demo)</span></h2>
    <p class="muted">Everything the owner can manage without touching code. Changes here instantly affect the public calendar.</p>
    <div class="tabs">${t('bookings','Bookings')}${t('inflatables','Inflatables')}${t('blackouts','Blackout dates')}${t('settings','Settings')}</div>
    ${body}
  </div></section>`;
}
function adminBookings(){
  const t=todayKey();
  const up=state.bookings.filter(b=>b.status==='paid').length;
  const rev=state.bookings.filter(b=>b.status==='paid').reduce((s,b)=>s+b.totalPence,0);
  const rows=[...state.bookings].sort((a,b)=>a.date<b.date?1:-1).map(b=>{
    const c=byId(b.castleId);
    return `<tr><td><strong>${fmtDate(b.date)}</strong>${b.deliveryTime?'<br><span class="muted" style="font-size:12px">'+esc(b.deliveryTime)+'</span>':''}</td><td>${esc(c?c.name:'?')}</td><td>${esc(b.customerName)}<br><span class="muted" style="font-size:12px">${esc(b.phone)}</span></td><td>${esc(b.postcode)}</td><td>${gbp(b.totalPence)}</td><td><span class="tag ${b.status}">${b.status}</span></td><td>${b.status!=='cancelled'?'<button class="link" style="color:#dc2626" onclick="cancelB(\''+b.id+'\')">Cancel</button>':''}</td></tr>`;
  }).join('');
  return `<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-bottom:18px">
      <div class="card stat"><div class="muted" style="font-size:13px">Paid bookings</div><div class="n">${up}</div></div>
      <div class="card stat"><div class="muted" style="font-size:13px">Total revenue</div><div class="n">${gbp(rev)}</div></div>
      <div class="card stat"><div class="muted" style="font-size:13px">Active castles</div><div class="n">${state.inflatables.filter(c=>c.active).length}</div></div>
      <div class="card stat"><div class="muted" style="font-size:13px">Blackout dates</div><div class="n">${state.blackouts.length}</div></div>
    </div>
    <div class="card" style="padding:14px;overflow-x:auto"><table><thead><tr><th>Date</th><th>Inflatable</th><th>Customer</th><th>Postcode</th><th>Total</th><th>Status</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan=7 class="muted">No bookings yet.</td></tr>'}</tbody></table></div>
    <p class="muted" style="font-size:12px;margin-top:8px">Cancelling frees the date immediately (try it, then check the calendar).</p>`;
}
function cancelB(id){const b=state.bookings.find(x=>x.id===id);if(b){b.status='cancelled';save();render();}}
function adminInflatables(){
  const rows=state.inflatables.map(c=>`<tr><td><strong>${esc(c.name)}</strong> ${c.active?'':'<span class="tag cancelled">inactive</span>'} ${c.pricePence==null?'<span class="tag held">price not set</span>':''}</td><td>${gbp(c.pricePence)}</td><td>${esc(c.theme||'—')}</td><td><button class="link" onclick="toggleC('${c.id}')">${c.active?'Deactivate':'Activate'}</button></td></tr>`).join('');
  return `<div class="card" style="padding:14px;overflow-x:auto"><table><thead><tr><th>Name</th><th>Price/day</th><th>Theme</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
  <p class="muted" style="font-size:12px;margin-top:8px">In the full site you also add/edit names, prices, descriptions and photos here. Deactivating hides a castle from the site.</p>`;
}
function toggleC(id){const c=byId(id);if(c){c.active=!c.active;save();render();}}
function adminBlackouts(){
  const t=todayKey();
  const list=[...state.blackouts].sort().map(d=>`<div class="card" style="padding:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><strong>${fmtDate(d)}</strong><button class="link" style="color:#dc2626" onclick="rmBlackout('${d}')">Remove</button></div>`).join('')||'<p class="muted">No blackout dates.</p>';
  return `<div style="display:grid;gap:24px;grid-template-columns:1fr 1fr" class="detailgrid">
    <div><h3 style="font-size:18px">Block out a date</h3><p class="muted" style="font-size:14px;margin:6px 0 12px">Blacked-out days are unbookable for every castle.</p>
      <div class="card" style="padding:16px"><label>Date</label><input type="date" id="bo_date" min="${t}"/><button class="btn btn-primary" style="margin-top:12px" onclick="addBlackout()">Block this date</button></div></div>
    <div><h3 style="font-size:18px">Upcoming blackout dates</h3><div style="margin-top:12px">${list}</div></div>
  </div>`;
}
function addBlackout(){const v=document.getElementById('bo_date').value;if(v&&!state.blackouts.includes(v)){state.blackouts.push(v);save();render();}}
function rmBlackout(d){state.blackouts=state.blackouts.filter(x=>x!==d);save();render();}
function adminSettings(){
  const s=state.settings;
  return `<div class="card" style="padding:20px;max-width:560px">
    <label>Max deliveries per day (the "one van" rule)</label>
    <input type="number" min="1" id="s_max" value="${s.maxDeliveriesPerDay}" style="width:120px"/>
    <p class="muted" style="font-size:12px;margin:4px 0 16px">When this many bookings exist on a date, that date becomes unavailable for ALL castles. Set to 1 and book one castle — every other castle is blocked that day too.</p>
    <label>Minimum lead time (days)</label>
    <input type="number" min="0" id="s_lead" value="${s.minLeadTimeDays}" style="width:120px"/>
    <p class="muted" style="font-size:12px;margin:4px 0 16px">0 = same-day allowed. 1 = bookable from tomorrow.</p>
    <label>Delivery postcode prefixes</label>
    <input id="s_pc" value="${s.prefixes.join(', ')}"/>
    <p class="muted" style="font-size:12px;margin:4px 0 16px">Comma separated, e.g. LS, WF. Blank = anywhere.</p>
    <div id="s_ok"></div>
    <button class="btn btn-primary" onclick="saveSettings()">Save settings</button>
  </div>`;
}
function saveSettings(){
  state.settings.maxDeliveriesPerDay=Math.max(1,parseInt(document.getElementById('s_max').value)||1);
  state.settings.minLeadTimeDays=Math.max(0,parseInt(document.getElementById('s_lead').value)||0);
  state.settings.prefixes=document.getElementById('s_pc').value.split(',').map(x=>x.trim().toUpperCase()).filter(Boolean);
  save();
  document.getElementById('s_ok').innerHTML='<div class="ok" style="margin-bottom:10px">Saved — the public calendar now reflects this.</div>';
}

/* ---------- router ---------- */
function render(){
  const h=location.hash.replace(/^#/,'')||'/';
  const parts=h.split('/').filter(Boolean);
  let html;
  if(parts.length===0)html=viewHome();
  else if(parts[0]==='castles')html=viewCastles();
  else if(parts[0]==='castle')html=viewCastle(parts[1]);
  else if(parts[0]==='confirm')html=viewConfirm(parts[1]);
  else if(parts[0]==='admin')html=viewAdmin(parts[1]);
  else html=viewHome();
  document.getElementById('app').innerHTML=html;
  window.scrollTo(0,0);
}
window.addEventListener('hashchange',render);
render();
// responsive: collapse detail grid on small screens
const mq=matchMedia('(max-width:760px)');
function resp(){document.querySelectorAll('.detailgrid').forEach(e=>e.style.gridTemplateColumns=mq.matches?'1fr':'1fr 1fr');}
mq.addEventListener('change',resp);new MutationObserver(resp).observe(document.getElementById('app'),{childList:true});
</script>
</body>
</html>
